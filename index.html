<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الموقع مغلق مؤقتاً</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh;
    background: radial-gradient(circle at 50% 30%, #1a0e2e 0%, #0a0510 60%, #000000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* خلفية جزيئات متحركة */
  #particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 40px;
    max-width: 500px;
  }

  .logo-wrap {
    width: 130px;
    height: 130px;
    margin: 0 auto 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, #8b5cf6, #ec4899, #3b82f6);
    background-size: 300% 300%;
    animation: gradientShift 4s ease infinite, floatLogo 3s ease-in-out infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 40px rgba(139, 92, 246, 0.6), 0 0 80px rgba(236, 72, 153, 0.3);
    position: relative;
  }

  .logo-wrap::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    animation: pulseRing 2s ease-out infinite;
  }

  .logo-inner {
    width: 100px;
    height: 100px;
    background: #0a0510;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 15px rgba(139, 92, 246, 0.9);
  }

  @keyframes gradientShift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  @keyframes floatLogo {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  @keyframes pulseRing {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.3); opacity: 0; }
  }

  h1 {
    color: #fff;
    font-size: 28px;
    margin-bottom: 14px;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #8b5cf6, #ec4899);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  p {
    color: #b3a8c9;
    font-size: 15px;
    line-height: 1.9;
    margin-bottom: 28px;
  }

  .footer-note {
    margin-top: 30px;
    color: #5e5470;
    font-size: 12px;
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">
  <div class="logo-wrap">
    <div class="logo-inner">X</div>
  </div>

  <h1>الموقع مغلق مؤقتاً</h1>
  <p>نعتذر عن الإزعاج، نحن نعمل حالياً على تطوير وتحسين الموقع.<br>راح نرجع أفضل وياكم قريباً 🚀</p>

  <div class="footer-note">© جميع الحقوق محفوظة</div>
</div>

<script>
  // ---- خلفية جزيئات متحركة ----
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  const particles = [];
  const colors = ['#8b5cf6', '#ec4899', '#3b82f6'];

  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2 + 0.5,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3,
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: Math.random() * 0.5 + 0.2
    });
  }

  function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.dx;
      p.y += p.dy;

      if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha;
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(animateParticles);
  }

  animateParticles();
</script>

</body>
</html>
